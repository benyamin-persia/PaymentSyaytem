<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Customer</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"> <!-- Forces browser to load the served favicon path consistently. -->
</head>
<body>
<h1>Add Customer</h1>

<form th:action="@{/customers/add}" th:object="${customer}" method="post">
    <div>
        <label for="firstName">First Name:</label>
        <input id="firstName" type="text" th:field="*{firstName}">
        <small th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
    </div>

    <div>
        <label for="lastName">Last Name:</label>
        <input id="lastName" type="text" th:field="*{lastName}">
        <small th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
    </div>

    <div>
        <label for="email">Email:</label>
        <input id="email" type="email" th:field="*{email}">
        <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
    </div>

    <button type="submit">Save Customer</button>
</form>

<p>
    <a th:href="@{/customers}">Back to customers list</a>
</p>

<hr>
<form th:action="@{/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Logout</button>
</form>
</body>
</html>
